<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Coin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Inter, system-ui, sans-serif;
            background: #0F0F1A;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
        }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        p { color: rgba(255,255,255,0.6); font-size: 0.95rem; line-height: 1.6; max-width: 320px; }
        .retry {
            margin-top: 2rem;
            background: #7C3AED;
            color: #fff;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }
        .retry:hover { background: #6D28D9; }
    </style>
</head>
<body>
    <div class="icon">💰</div>
    <h1>You're offline</h1>
    <p>No internet connection. You can still add transactions — they'll sync when you reconnect.</p>
    <button class="retry" onclick="window.location.reload()">Try again</button>
</body>
</html>
