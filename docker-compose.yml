services:
  app:
    build:
      context: .
      target: app
    image: coin-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
      - app_public:/var/www/html/public-volume
    networks:
      - coin_network
    depends_on:
      mysql:
        condition: service_healthy

  queue:
    image: coin-app
    restart: unless-stopped
    entrypoint: ["php", "artisan", "queue:listen", "--timeout=60"]
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - coin_network
    depends_on:
      - app
      - mysql

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
    networks:
      - coin_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-coin}
      MYSQL_USER: ${DB_USERNAME:-coin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - coin_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  app_storage:
  app_public:

networks:
  coin_network:
    driver: bridge
